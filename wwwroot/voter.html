<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Real-Time Polling</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"]::placeholder {
            letter-spacing: 4px;
            font-size: 16px;
        }

        .join-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .join-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fff3f3;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .poll-container {
            display: none;
        }

        .poll-question {
            font-size: 1.5rem;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .room-code-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            letter-spacing: 4px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            padding: 18px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 500;
        }

        .option-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: translateX(4px);
        }

        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .confirmation-container {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .confirmation-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .confirmation-text {
            color: #666;
            margin-bottom: 25px;
        }

        .voted-option {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #333;
        }

        .vote-again-btn {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vote-again-btn:hover {
            background: #e0e0e0;
        }

        .already-voted-container {
            display: none;
            text-align: center;
        }

        .already-voted-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .already-voted-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .already-voted-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .already-voted-text {
            color: #666;
            margin-bottom: 25px;
        }

        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link:hover {
            color: white;
        }

        .nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: white;
        }

        .nav-link.active {
            color: white;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
        }

        body {
            padding-top: 70px;
        }

        @media (max-width: 600px) {
            .nav-brand {
                font-size: 1rem;
            }

            .nav-links {
                gap: 15px;
            }

            .nav-link {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Real-Time Polling</a>
            <div class="nav-links">
                <a href="presenter.html" class="nav-link">Create Poll</a>
                <a href="voter.html" class="nav-link active">Join Poll</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Join Poll</h1>

        <div class="card">
            <div id="join-container">
                <div id="error-message" class="error-message"></div>

                <form id="join-form">
                    <div class="form-group">
                        <label for="room-code">Enter Room Code</label>
                        <input type="text" id="room-code" name="roomCode" placeholder="1234" maxlength="4" required autocomplete="off">
                    </div>

                    <button type="submit" class="join-btn" id="join-btn">Join Poll</button>
                </form>
            </div>

            <div id="poll-container" class="poll-container">
                <div style="text-align: center;">
                    <span id="room-code-badge" class="room-code-badge"></span>
                </div>
                <h2 id="poll-question" class="poll-question"></h2>
                <div id="options-list" class="options-list"></div>
            </div>

            <div id="confirmation-container" class="confirmation-container">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                    </svg>
                </div>
                <h2 class="confirmation-title">Vote Submitted!</h2>
                <p class="confirmation-text">Your vote has been recorded.</p>
                <div id="voted-option" class="voted-option"></div>
                <button type="button" class="vote-again-btn" id="vote-again-btn">Join Another Poll</button>
            </div>

            <div id="already-voted-container" class="already-voted-container">
                <div class="already-voted-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                </div>
                <h2 class="already-voted-title">Already Voted</h2>
                <p class="already-voted-text">You have already cast your vote in this poll.</p>
                <button type="button" class="vote-again-btn" id="try-another-btn">Join Another Poll</button>
            </div>
        </div>

        <a href="presenter.html" class="back-link">Create your own poll →</a>
    </div>

    <script>
        const joinForm = document.getElementById('join-form');
        const roomCodeInput = document.getElementById('room-code');
        const joinBtn = document.getElementById('join-btn');
        const errorMessage = document.getElementById('error-message');
        const joinContainer = document.getElementById('join-container');
        const pollContainer = document.getElementById('poll-container');
        const confirmationContainer = document.getElementById('confirmation-container');
        const alreadyVotedContainer = document.getElementById('already-voted-container');
        const voteAgainBtn = document.getElementById('vote-again-btn');
        const tryAnotherBtn = document.getElementById('try-another-btn');

        let currentPoll = null;

        function getVoterId() {
            let voterId = localStorage.getItem('voterId');
            if (!voterId) {
                voterId = crypto.randomUUID();
                localStorage.setItem('voterId', voterId);
            }
            return voterId;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function showJoinForm() {
            joinContainer.style.display = 'block';
            pollContainer.style.display = 'none';
            confirmationContainer.style.display = 'none';
            alreadyVotedContainer.style.display = 'none';
            roomCodeInput.value = '';
            currentPoll = null;
            hideError();
        }

        function showPoll(poll) {
            currentPoll = poll;

            document.getElementById('room-code-badge').textContent = poll.roomCode;
            document.getElementById('poll-question').textContent = poll.question;

            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';

            poll.options.forEach(option => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.dataset.optionId = option.id;
                btn.addEventListener('click', () => castVote(option));
                optionsList.appendChild(btn);
            });

            joinContainer.style.display = 'none';
            pollContainer.style.display = 'block';
            confirmationContainer.style.display = 'none';
            alreadyVotedContainer.style.display = 'none';
        }

        function showConfirmation(optionText) {
            document.getElementById('voted-option').textContent = `You voted: ${optionText}`;

            joinContainer.style.display = 'none';
            pollContainer.style.display = 'none';
            confirmationContainer.style.display = 'block';
            alreadyVotedContainer.style.display = 'none';
        }

        function showAlreadyVoted() {
            joinContainer.style.display = 'none';
            pollContainer.style.display = 'none';
            confirmationContainer.style.display = 'none';
            alreadyVotedContainer.style.display = 'block';
        }

        function setOptionButtonsDisabled(disabled) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = disabled;
            });
        }

        async function joinPoll(roomCode) {
            try {
                const response = await fetch(`/api/polls/${roomCode}`);
                const data = await response.json();

                if (!response.ok) {
                    if (response.status === 404) {
                        showError('Poll not found. Please check the room code and try again.');
                    } else {
                        showError(data.error || 'Unable to join poll. Please try again.');
                    }
                    return;
                }

                showPoll(data);
            } catch (error) {
                showError('Network error. Please check your connection and try again.');
            }
        }

        async function castVote(option) {
            setOptionButtonsDisabled(true);

            try {
                const response = await fetch(`/api/polls/${currentPoll.roomCode}/vote`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        optionId: option.id,
                        voterId: getVoterId()
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    setOptionButtonsDisabled(false);
                    if (response.status === 404) {
                        showError('Poll not found. It may have been closed.');
                        showJoinForm();
                    } else if (response.status === 409) {
                        showAlreadyVoted();
                    } else if (response.status === 410) {
                        showError('This poll has been closed and is no longer accepting votes.');
                    } else {
                        showError(data.error || 'Unable to submit vote. Please try again.');
                    }
                    return;
                }

                showConfirmation(option.text);
            } catch (error) {
                setOptionButtonsDisabled(false);
                showError('Network error. Please check your connection and try again.');
            }
        }

        joinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const roomCode = roomCodeInput.value.trim().toUpperCase();

            if (!roomCode) {
                showError('Please enter a room code');
                return;
            }

            if (roomCode.length !== 4 || !/^\d{4}$/.test(roomCode)) {
                showError('Room code must be exactly 4 digits');
                return;
            }

            joinBtn.disabled = true;
            joinBtn.textContent = 'Joining...';

            await joinPoll(roomCode);

            joinBtn.disabled = false;
            joinBtn.textContent = 'Join Poll';
        });

        voteAgainBtn.addEventListener('click', showJoinForm);
        tryAnotherBtn.addEventListener('click', showJoinForm);

        roomCodeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
        });

        function getRoomCodeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('room') || params.get('roomCode') || params.get('code');
        }

        const urlRoomCode = getRoomCodeFromUrl();
        if (urlRoomCode && /^\d{4}$/.test(urlRoomCode)) {
            roomCodeInput.value = urlRoomCode;
            joinPoll(urlRoomCode);
        }
    </script>
</body>
</html>
