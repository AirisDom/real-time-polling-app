<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results - Real-Time Polling</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            background: #fff3f3;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-indicator.connected {
            background: #2ecc71;
        }

        .status-indicator.connecting {
            background: #f39c12;
            animation: pulse 1s infinite;
        }

        .status-indicator.disconnected {
            background: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .room-code-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            letter-spacing: 4px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .poll-question {
            font-size: 1.75rem;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .total-votes {
            text-align: center;
            color: #666;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .total-votes span {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2rem;
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-text {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .vote-count {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
            min-width: 80px;
            text-align: right;
        }

        .bar-container {
            background: #f0f0f0;
            border-radius: 8px;
            height: 40px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            transition: width 0.5s ease-out;
            min-width: 0;
        }

        .bar-percentage {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 600;
            color: #666;
            font-size: 0.9rem;
        }

        .bar.has-votes .bar-percentage {
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .loading-container {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 20px;
        }

        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link:hover {
            color: white;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Results</h1>

        <div class="card">
            <div id="loading-container" class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading poll...</div>
            </div>

            <div id="error-container" style="display: none;">
                <div id="error-message" class="error-message" style="display: block;"></div>
                <div class="empty-state" style="display: block;">
                    <h2>Unable to Load Poll</h2>
                    <p>Please check the room code and try again.</p>
                    <a href="voter.html" class="back-link" style="color: #667eea;">Join a poll</a>
                </div>
            </div>

            <div id="results-section" style="display: none;">
                <div class="connection-status">
                    <div id="status-indicator" class="status-indicator connecting"></div>
                    <span id="status-text">Connecting...</span>
                </div>

                <div class="header-section">
                    <span id="room-code-badge" class="room-code-badge"></span>
                    <h2 id="poll-question" class="poll-question"></h2>
                    <div class="total-votes">Total votes: <span id="total-votes">0</span></div>
                </div>

                <div id="results-container" class="results-container"></div>
            </div>
        </div>

        <a href="presenter.html" class="back-link">Create your own poll</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        const loadingContainer = document.getElementById('loading-container');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const resultsSection = document.getElementById('results-section');
        const resultsContainer = document.getElementById('results-container');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        let connection = null;
        let currentPoll = null;
        let currentResults = [];

        function getRoomCodeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('room') || params.get('roomCode') || params.get('code');
        }

        function showError(message) {
            loadingContainer.style.display = 'none';
            resultsSection.style.display = 'none';
            errorMessage.textContent = message;
            errorContainer.style.display = 'block';
        }

        function showResults() {
            loadingContainer.style.display = 'none';
            errorContainer.style.display = 'none';
            resultsSection.style.display = 'block';
        }

        function updateConnectionStatus(status) {
            statusIndicator.className = 'status-indicator ' + status;
            switch (status) {
                case 'connected':
                    statusText.textContent = 'Live';
                    break;
                case 'connecting':
                    statusText.textContent = 'Connecting...';
                    break;
                case 'disconnected':
                    statusText.textContent = 'Disconnected';
                    break;
            }
        }

        function calculatePercentage(votes, total) {
            if (total === 0) return 0;
            return Math.round((votes / total) * 100);
        }

        function renderResults(results) {
            currentResults = results;
            const totalVotes = results.reduce((sum, opt) => sum + opt.voteCount, 0);
            document.getElementById('total-votes').textContent = totalVotes;

            resultsContainer.innerHTML = '';

            results.forEach(option => {
                const percentage = calculatePercentage(option.voteCount, totalVotes);
                const hasVotes = percentage > 50;

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-header">
                        <span class="option-text">${escapeHtml(option.text)}</span>
                        <span class="vote-count">${option.voteCount} vote${option.voteCount !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar ${hasVotes ? 'has-votes' : ''}" style="width: ${percentage}%"></div>
                        <span class="bar-percentage">${percentage}%</span>
                    </div>
                `;
                resultsContainer.appendChild(item);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function fetchPoll(roomCode) {
            try {
                const response = await fetch(`/api/polls/${roomCode}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        showError('Poll not found. Please check the room code.');
                    } else {
                        showError('Unable to load poll. Please try again.');
                    }
                    return null;
                }
                return await response.json();
            } catch (error) {
                showError('Network error. Please check your connection.');
                return null;
            }
        }

        async function initializeSignalR(roomCode) {
            connection = new signalR.HubConnectionBuilder()
                .withUrl('/hubs/poll')
                .withAutomaticReconnect()
                .build();

            connection.on('VoteUpdated', (payload) => {
                if (payload.roomCode === roomCode) {
                    renderResults(payload.results);
                }
            });

            connection.onreconnecting(() => {
                updateConnectionStatus('connecting');
            });

            connection.onreconnected(() => {
                updateConnectionStatus('connected');
                connection.invoke('JoinRoom', roomCode).catch(console.error);
            });

            connection.onclose(() => {
                updateConnectionStatus('disconnected');
            });

            try {
                updateConnectionStatus('connecting');
                await connection.start();
                await connection.invoke('JoinRoom', roomCode);
                updateConnectionStatus('connected');
            } catch (error) {
                console.error('SignalR connection error:', error);
                updateConnectionStatus('disconnected');
            }
        }

        async function initialize() {
            const roomCode = getRoomCodeFromUrl();

            if (!roomCode) {
                showError('No room code provided. Add ?room=XXXX to the URL.');
                return;
            }

            const poll = await fetchPoll(roomCode);
            if (!poll) return;

            currentPoll = poll;

            document.getElementById('room-code-badge').textContent = poll.roomCode;
            document.getElementById('poll-question').textContent = poll.question;

            const initialResults = poll.options.map(opt => ({
                optionId: opt.id,
                text: opt.text,
                voteCount: 0
            }));
            renderResults(initialResults);

            showResults();

            await initializeSignalR(roomCode);
        }

        initialize();
    </script>
</body>
</html>
